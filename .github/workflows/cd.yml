name: CD

# Triggers:
#   push to main  → build image, deploy to STAGING automatically
#   push a tag v* → deploy the already-built image to PRODUCTION (requires reviewer)
on:
  push:
    branches: [main]
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

# Required repository secrets (Settings → Secrets and variables → Actions):
#
# Shared:
#   RAILWAY_STAGING_DEPLOY_HOOK   — Railway deploy webhook URL for staging service
#   RAILWAY_PRODUCTION_DEPLOY_HOOK — Railway deploy webhook URL for production service
#
# Optional — only needed if you switch from Railway to a custom VPS / AWS ECS:
#   SSH_HOST, SSH_USER, SSH_PRIVATE_KEY
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, ECS_CLUSTER, ECS_SERVICE
#
# GitHub Container Registry is used automatically via GITHUB_TOKEN — no extra secret needed.

env:
  REGISTRY: ghcr.io
  # e.g. ghcr.io/your-org/pharmacy-backend
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Build and push Docker image ──────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # needed to push to ghcr.io

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag rules:
          #   main branch  → :main, :sha-<short>
          #   v1.2.3 tag   → :1.2.3, :1.2, :1, :latest
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          # Layer cache — dramatically speeds up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_VERSION=20
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

  # ── 2. Deploy to staging ─────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    # "staging" must be configured as an Environment in GitHub repo settings
    # (Settings → Environments → staging).  No approval required for staging.
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Trigger Railway staging deploy
        # Railway watches the GHCR image and redeploys on push.
        # The deploy hook forces an immediate redeploy.
        run: |
          curl --silent --show-error --fail \
               -X POST "${{ secrets.RAILWAY_STAGING_DEPLOY_HOOK }}"

      - name: Wait for deployment and run healthcheck
        run: |
          echo "Waiting 30s for Railway to pull and restart the container..."
          sleep 30
          for i in $(seq 1 10); do
            STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
                     "${{ vars.STAGING_URL }}/health" || true)
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Staging is healthy."
              exit 0
            fi
            sleep 10
          done
          echo "Staging healthcheck failed after 10 attempts."
          exit 1

      - name: Run post-deploy index sync
        # Ensures any new Mongoose indexes exist in the Atlas staging cluster.
        # Railway's "Start Command" can also run this before starting the app.
        run: |
          echo "Index sync must run inside the staging container."
          echo "Add 'node scripts/ensure-indexes.js && node index.js' as Railway start command."

  # ── 3. Deploy to production ──────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    # "production" Environment in GitHub requires manual reviewer approval
    # (Settings → Environments → production → Required reviewers).
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Trigger Railway production deploy
        run: |
          curl --silent --show-error --fail \
               -X POST "${{ secrets.RAILWAY_PRODUCTION_DEPLOY_HOOK }}"

      - name: Wait for deployment and run healthcheck
        run: |
          echo "Waiting 45s for Railway to pull and restart the container..."
          sleep 45
          for i in $(seq 1 15); do
            STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
                     "${{ vars.PRODUCTION_URL }}/health" || true)
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Production is healthy."
              exit 0
            fi
            sleep 10
          done
          echo "Production healthcheck failed after 15 attempts."
          exit 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
