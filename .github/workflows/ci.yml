name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true   # cancel older run when a new commit is pushed to the same PR

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npx prettier --check "src/**/*.js" "index.js" "scripts/**/*.js"

  # ── 2. Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint

    env:
      # Runtime
      NODE_ENV: test
      PORT: 5000
      LOG_LEVEL: error

      # MongoDB — placeholder; MongoMemoryServer replaces the URI at runtime
      MONGO_URI: mongodb://127.0.0.1:27017/pharmacy-test

      # JWT — test-only keys, safe to have in the workflow file
      JWT_SECRET: ci-jwt-secret-minimum-32-characters-long
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret-minimum-32-characters
      JWT_EXPIRE: 15m

      # Admin
      ADMIN_REGISTRATION_SECRET: ci-admin-secret

      # CORS / Client URL (not used in tests but env.js may reference them)
      CORS_ORIGIN: http://localhost:5173
      CLIENT_URL: http://localhost:3000

      # Services — mocked/no-op in test mode
      CLOUDINARY_CLOUD_NAME: test
      CLOUDINARY_API_KEY: test
      CLOUDINARY_API_SECRET: test
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      EMAIL_HOST: smtp.example.com
      EMAIL_PORT: 587
      EMAIL_USER: test@example.com
      EMAIL_PASS: test
      EMAIL_FROM_NAME: PharmacyTest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ── 3. Security audit ────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high + critical only)
        run: npm audit --audit-level=high
        # High/critical vulnerabilities fail the build.
        # Moderate/low are reported but do not block merges — fix them in
        # a dedicated dependency-update PR.
