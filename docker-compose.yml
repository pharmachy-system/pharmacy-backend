# Local development only.
# Uses a local MongoDB container so developers can work without an Atlas connection.
#
# Usage:
#   docker compose up            # start API + MongoDB
#   docker compose up --build    # rebuild the API image first
#   docker compose down -v       # stop everything and remove volumes
#
# The API auto-restarts on code changes when NODE_ENV=development
# because nodemon is configured as the dev command.

services:
  # ── API server ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: pharmacy-api:dev
    container_name: pharmacy-api
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      # Override MONGO_URI to point to the local MongoDB container
      MONGO_URI: mongodb://mongo:27017/pharmacy
      NODE_ENV: development
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      # Mount logs directory so logs persist across container restarts
      - ./logs:/app/logs
    networks:
      - pharmacy-net
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:6.0
    container_name: pharmacy-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"       # expose for MongoDB Compass / mongosh
    volumes:
      - mongo_data:/data/db
    networks:
      - pharmacy-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5

  # ── Mongo Express (optional GUI) ─────────────────────────────────────────────
  # Access at http://localhost:8081
  # Remove this block if you prefer Compass or Atlas Data Explorer.
  mongo-express:
    image: mongo-express:1.0
    container_name: pharmacy-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - pharmacy-net
    profiles:
      - debug   # only starts with: docker compose --profile debug up

volumes:
  mongo_data:
    driver: local

networks:
  pharmacy-net:
    driver: bridge
